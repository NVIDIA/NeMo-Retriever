# Core managed NRL service profile: service, VectorDB, and core NIMs.
topology:
  mode: standalone
  otel:
    enabled: false

serviceConfig:
  vectordb:
    enabled: true

nims:
  enabled: true

nimOperator:
  object_detection:
    enabled: true
  ocr:
    enabled: true
  vlm_embed:
    enabled: true
  rerankqa:
    enabled: false
  nemotron_parse:
    enabled: false
  nemotron_3_nano_omni_30b_a3b_reasoning:
    enabled: false
  audio:
    enabled: false
