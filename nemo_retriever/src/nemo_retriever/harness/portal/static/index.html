<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harness Portal — NVIDIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <style>
    :root {
      --nv-green: #76b900;
      --nv-green-dark: #5a8a00;
      --nv-green-light: #8fd400;
      --nv-bg: #0e0e0e;
      --nv-sidebar: #141414;
      --nv-header: #161616;
      --nv-card: #1a1a1a;
      --nv-border: #262626;
      --nv-text: #e0e0e0;
      --nv-text-muted: #888;
      --nv-text-dim: #555;
      --nv-row-even: #161616;
      --nv-row-odd: #1c1c1c;
      --nv-row-hover: #242424;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--nv-bg);
      color: var(--nv-text);
      overflow: hidden;
    }
    .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; }

    /* ---- Layout ---- */
    .app-layout { display: flex; height: 100vh; width: 100vw; }
    .sidebar {
      width: 250px; min-width: 250px; background: var(--nv-sidebar);
      border-right: 1px solid var(--nv-border);
      display: flex; flex-direction: column;
    }
    .sidebar-logo {
      padding: 20px; display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--nv-border);
    }
    .sidebar-logo h1 { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
    .sidebar-logo p { font-size: 11px; color: var(--nv-text-muted); line-height: 1.3; }
    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .sidebar-section-label {
      padding: 10px 20px 6px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.08em; font-weight: 600; color: var(--nv-text-dim);
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 20px;
      cursor: pointer; color: var(--nv-text-muted); transition: all 0.15s ease;
      border-left: 3px solid transparent; font-size: 14px; font-weight: 500; user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--nv-text); }
    .nav-item.active {
      background: rgba(118,185,0,0.06); color: var(--nv-green);
      border-left-color: var(--nv-green);
    }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .badge svg { width: 12px; height: 12px; flex-shrink: 0; }
    .sidebar-bottom { padding: 16px 20px; border-top: 1px solid var(--nv-border); }
    .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header {
      min-height: 56px; border-bottom: 1px solid var(--nv-border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--nv-header); gap: 16px;
    }
    .main-content { flex: 1; overflow-y: auto; padding: 24px; }
    .footer {
      min-height: 36px; border-top: 1px solid var(--nv-border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--nv-header); font-size: 12px; color: var(--nv-text-dim);
    }

    /* ---- Table ---- */
    .runs-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
    .runs-table thead th {
      padding: 10px 16px; text-align: left; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--nv-text-muted);
      border-bottom: 1px solid var(--nv-border); background: var(--nv-card);
      position: sticky; top: 0; z-index: 1;
    }
    .runs-table tbody tr:nth-child(even) { background: var(--nv-row-even); }
    .runs-table tbody tr:nth-child(odd) { background: var(--nv-row-odd); }
    .runs-table tbody tr:hover { background: var(--nv-row-hover); cursor: pointer; }
    .runs-table tbody tr { transition: background 0.1s ease; }
    .runs-table td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); }

    /* ---- Components ---- */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 100px; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em;
    }
    .badge-pass { background: rgba(118,185,0,0.12); color: #76b900; }
    .badge-fail { background: rgba(255,80,80,0.12); color: #ff5050; }
    .badge-na { background: rgba(255,255,255,0.05); color: #666; }
    .badge-pending { background: rgba(255,255,255,0.06); color: #888; }
    .badge-running { background: rgba(252,211,77,0.12); color: #fcd34d; }
    .badge-manual { background: rgba(100,180,255,0.12); color: #64b4ff; }
    .badge-scheduled { background: rgba(168,130,255,0.12); color: #a882ff; }
    .badge-github { background: rgba(255,255,255,0.08); color: #e0e0e0; }
    .badge-cron { background: rgba(168,130,255,0.12); color: #a882ff; }
    .badge-github-type { background: rgba(255,255,255,0.08); color: #e0e0e0; }
    .badge-enabled { background: rgba(118,185,0,0.12); color: #76b900; }
    .badge-disabled { background: rgba(255,80,80,0.08); color: #888; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none;
      transition: all 0.15s ease; font-family: inherit; text-decoration: none;
    }
    .btn-primary { background: var(--nv-green); color: #000; }
    .btn-primary:hover { background: var(--nv-green-light); }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: var(--nv-text); border: 1px solid var(--nv-border); }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-ghost { background: transparent; color: var(--nv-text-muted); }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--nv-text); }
    .btn-icon { padding: 8px; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; gap: 5px; }
    .input, .select {
      background: var(--nv-bg); border: 1px solid var(--nv-border);
      color: var(--nv-text); padding: 8px 12px; border-radius: 8px;
      font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    .input:focus, .select:focus { border-color: var(--nv-green); box-shadow: 0 0 0 1px rgba(118,185,0,0.3); }
    .input::placeholder { color: var(--nv-text-dim); }
    .card { background: var(--nv-card); border: 1px solid var(--nv-border); border-radius: 12px; overflow: hidden; }
    .tag {
      display: inline-flex; padding: 2px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 500;
      background: rgba(118,185,0,0.1); color: var(--nv-green); border: 1px solid rgba(118,185,0,0.2);
    }
    .section-title {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--nv-text-muted); font-weight: 600; margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid var(--nv-border);
    }
    .toggle {
      position: relative; display: inline-block; width: 36px; height: 20px; cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: #333; border-radius: 10px;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: ""; position: absolute; width: 16px; height: 16px;
      left: 2px; bottom: 2px; background: #888; border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--nv-green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #fff; }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; padding: 32px;
    }
    .modal-content {
      background: var(--nv-card); border: 1px solid var(--nv-border);
      border-radius: 16px; width: 100%; max-width: 840px;
      max-height: calc(100vh - 64px); display: flex; flex-direction: column;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }
    .modal-head {
      padding: 20px 24px; border-bottom: 1px solid var(--nv-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 24px; }
    .modal-foot {
      padding: 16px 24px; border-top: 1px solid var(--nv-border);
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }

    /* ---- Detail grid ---- */
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .detail-item {
      padding: 12px 16px; background: rgba(255,255,255,0.02);
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.04);
    }
    .detail-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--nv-text-muted); margin-bottom: 4px; font-weight: 500;
    }
    .detail-value { font-size: 14px; color: #fff; font-weight: 500; }
    .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .metric-card {
      padding: 16px; text-align: center; background: rgba(255,255,255,0.02);
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.04);
    }
    .metric-value { font-size: 22px; font-weight: 700; color: var(--nv-green); }
    .metric-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--nv-text-muted); margin-top: 4px; font-weight: 500;
    }

    /* ---- Misc ---- */
    .spinner {
      border: 2px solid #333; border-top-color: var(--nv-green); border-radius: 50%;
      width: 16px; height: 16px; animation: spin 0.7s linear infinite; display: inline-block;
    }
    .spinner-lg { width: 32px; height: 32px; border-width: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
    @media (max-width: 900px) {
      .metric-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

/* ===== Icons ===== */
const svgProps = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };

function IconDatabase() {
  return <svg {...svgProps}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;

function IconRefresh() {
  return <svg {...svgProps}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>;
}
function IconX() {
  return <svg {...svgProps}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
}
function IconFile() {
  return <svg {...svgProps}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>;
}
function IconPackage() {
  return <svg {...svgProps}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
}
function IconSearch() {
  return <svg {...svgProps}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
}
function IconServer() {
  return <svg {...svgProps}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>;
}
function IconEdit() {
  return <svg {...svgProps}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
}
function IconTrash() {
  return <svg {...svgProps}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
}
function IconPlus() {
  return <svg {...svgProps}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
}
function IconCalendar() {
  return <svg {...svgProps}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
}
function IconGithub() {
  return <svg {...svgProps} viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>;
}
function IconFolder() {
  return <svg {...svgProps}><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>;
}
function IconSliders() {
  return <svg {...svgProps}><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>;
}
function IconChart() {
  return <svg {...svgProps}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
}
function IconBell() {
  return <svg {...svgProps}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
}
function IconCheck() {
  return <svg {...svgProps}><polyline points="20 6 9 17 4 12"/></svg>;
}
function IconAlertTriangle() {
  return <svg {...svgProps}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
}
function IconExternalLink() {
  return <svg {...svgProps}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
}

/* ===== Utilities ===== */
function fmt(val, decimals = 2) {
  if (val === null || val === undefined) return "\u2014";
  return typeof val === "number" ? val.toFixed(decimals) : String(val);
}

function fmtTs(ts) {
  if (!ts) return "\u2014";
  if (/^\d{8}_\d{6}_UTC$/.test(ts)) {
    const y = ts.slice(0,4), mo = ts.slice(4,6), d = ts.slice(6,8);
    const h = ts.slice(9,11), mi = ts.slice(11,13), s = ts.slice(13,15);
    return `${y}-${mo}-${d} ${h}:${mi}:${s} UTC`;
  }
  try { return new Date(ts).toLocaleString(); } catch { return ts; }
}

/* ===== Commit Link ===== */
function CommitLink({ sha, repoUrl, truncate = 10, style = {} }) {
  if (!sha) return <span style={style}>{"\u2014"}</span>;
  const display = truncate ? sha.slice(0, truncate) : sha;
  if (repoUrl) {
    const href = `${repoUrl}/commit/${sha}`;
    return (
      <a href={href} target="_blank" rel="noopener noreferrer" className="mono"
        title={`View commit ${sha} on GitHub`}
        style={{fontSize:'12px',color:'var(--nv-green)',textDecoration:'none',borderBottom:'1px dashed var(--nv-green)',cursor:'pointer',...style}}
        onClick={e => e.stopPropagation()}>
        {display}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          style={{width:'10px',height:'10px',marginLeft:'3px',verticalAlign:'middle',opacity:0.6}}>
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    );
  }
  return <span className="mono" style={{fontSize:'12px',color:'var(--nv-green)',...style}}>{display}</span>;
}

/* ===== Pagination ===== */
const PAGE_SIZE_OPTIONS = [10, 25, 50, 100, 250];

function usePagination(data, defaultPageSize = 25) {
  const [page, setPage] = useState(0);
  const [pageSize, setPageSize] = useState(defaultPageSize);
  const totalPages = Math.max(1, Math.ceil(data.length / pageSize));
  const safePage = Math.min(page, totalPages - 1);
  useEffect(() => { if (page !== safePage) setPage(safePage); }, [page, safePage]);
  const pageData = data.slice(safePage * pageSize, safePage * pageSize + pageSize);
  return {
    page: safePage, setPage, pageSize, setPageSize: (s) => { setPageSize(s); setPage(0); },
    totalPages, pageData, totalItems: data.length,
  };
}

function Pagination({ page, totalPages, totalItems, pageSize, onPageChange, onPageSizeChange }) {
  if (totalItems === 0) return null;
  const start = page * pageSize + 1;
  const end = Math.min((page + 1) * pageSize, totalItems);
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderTop:'1px solid var(--nv-border)',fontSize:'12px',color:'var(--nv-text-muted)',flexWrap:'wrap',gap:'8px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
        <span>Rows per page:</span>
        <select className="select" value={pageSize} onChange={e=>onPageSizeChange(parseInt(e.target.value,10))}
          style={{padding:'3px 8px',fontSize:'12px',minWidth:'60px',borderRadius:'6px'}}>
          {PAGE_SIZE_OPTIONS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      <span>{start}–{end} of {totalItems}</span>
      <div style={{display:'flex',alignItems:'center',gap:'2px'}}>
        <button className="btn btn-ghost btn-sm btn-icon" disabled={page===0} onClick={()=>onPageChange(0)}
          style={{padding:'4px 6px',opacity:page===0?0.3:1}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:'14px',height:'14px'}}>
            <polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/>
          </svg>
        </button>
        <button className="btn btn-ghost btn-sm btn-icon" disabled={page===0} onClick={()=>onPageChange(page-1)}
          style={{padding:'4px 6px',opacity:page===0?0.3:1}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:'14px',height:'14px'}}>
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span style={{padding:'0 8px',fontSize:'12px',color:'var(--nv-text-muted)'}}>
          Page {page+1} of {totalPages}
        </span>
        <button className="btn btn-ghost btn-sm btn-icon" disabled={page>=totalPages-1} onClick={()=>onPageChange(page+1)}
          style={{padding:'4px 6px',opacity:page>=totalPages-1?0.3:1}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:'14px',height:'14px'}}>
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
        <button className="btn btn-ghost btn-sm btn-icon" disabled={page>=totalPages-1} onClick={()=>onPageChange(totalPages-1)}
          style={{padding:'4px 6px',opacity:page>=totalPages-1?0.3:1}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:'14px',height:'14px'}}>
            <polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

/* ===== Badges ===== */
function StatusBadge({ success }) {
  if (success === 1) return <span className="badge badge-pass">{"\u25CF"} Pass</span>;
  if (success === 0) return <span className="badge badge-fail">{"\u25CF"} Fail</span>;
  return <span className="badge badge-na">{"\u25CF"} N/A</span>;
}

function JobStatusBadge({ status }) {
  const cls = { pending:"badge-pending", running:"badge-running", completed:"badge-pass", failed:"badge-fail", error:"badge-fail", cancelled:"badge-na" };
  return <span className={`badge ${cls[status] || "badge-na"}`}>{status}</span>;
}

function TriggerSourceBadge({ source }) {
  if (!source) return <span className="badge badge-na">—</span>;
  const map = {
    manual: { cls: "badge-manual", label: "Manual" },
    scheduled: { cls: "badge-scheduled", label: "Scheduled" },
    github_push: { cls: "badge-github", label: "GitHub" },
  };
  const info = map[source] || { cls: "badge-na", label: source };
  return <span className={`badge ${info.cls}`}>{info.label}</span>;
}

function ScheduleTypeBadge({ type }) {
  if (type === "github_push") return <span className="badge badge-github-type"><IconGithub /> GitHub</span>;
  return <span className="badge badge-cron"><IconCalendar /> Cron</span>;
}

function DatasetFormModal({ dataset, onClose, onSaved }) {
  const isEdit = !!dataset;
  const [form, setForm] = useState({
    name: dataset?.name || "",
    path: dataset?.path || "",
    query_csv: dataset?.query_csv || "",
    input_type: dataset?.input_type || "pdf",
    recall_required: dataset?.recall_required || false,
    recall_match_mode: dataset?.recall_match_mode || "pdf_page",
    recall_adapter: dataset?.recall_adapter || "none",
    description: dataset?.description || "",
    tags: (dataset?.tags || []).join(", "),
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  function set(field, val) { setForm(f=>({...f,[field]:val})); }

  async function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim() || !form.path.trim()) return;
    setSaving(true);
    setError("");
    const payload = {
      ...form,
      query_csv: form.query_csv || null,
      description: form.description || null,
      tags: form.tags ? form.tags.split(",").map(t=>t.trim()).filter(Boolean) : [],
    };
    try {
      const url = isEdit ? `/api/managed-datasets/${dataset.id}` : "/api/managed-datasets";
      const method = isEdit ? "PUT" : "POST";
      const res = await fetch(url, {
        method, headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const data = await res.json().catch(()=>({}));
        throw new Error(data.detail || `HTTP ${res.status}`);
      }
      onSaved();
    } catch (err) {
      setError(err.message);
    } finally {
      setSaving(false);
    }
  }

  const labelStyle = {display:'block',fontSize:'12px',fontWeight:500,color:'var(--nv-text-muted)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.04em'};

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" style={{maxWidth:'560px'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2 style={{fontSize:'16px',fontWeight:700,color:'#fff'}}>{isEdit ? "Edit Dataset" : "Add Dataset"}</h2>
          <button className="btn btn-ghost btn-icon" onClick={onClose} style={{borderRadius:'50%'}}><IconX /></button>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:'16px',maxHeight:'60vh',overflowY:'auto'}}>
            {error && (
              <div style={{padding:'10px 14px',borderRadius:'8px',background:'rgba(255,50,50,0.08)',border:'1px solid rgba(255,50,50,0.2)',color:'#ff5050',fontSize:'13px'}}>{error}</div>
            )}
            <div>
              <label style={labelStyle}>Name *</label>
              <input className="input" style={{width:'100%'}} value={form.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. bo20" required />
            </div>
            <div>
              <label style={labelStyle}>Dataset Path *</label>
              <input className="input" style={{width:'100%'}} value={form.path} onChange={e=>set('path',e.target.value)} placeholder="/path/to/dataset" required />
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              <div>
                <label style={labelStyle}>Input Type</label>
                <select className="select" style={{width:'100%'}} value={form.input_type} onChange={e=>set('input_type',e.target.value)}>
                  <option value="pdf">pdf</option>
                  <option value="image">image</option>
                  <option value="text">text</option>
                </select>
              </div>
              <div>
                <label style={labelStyle}>Query CSV</label>
                <input className="input" style={{width:'100%'}} value={form.query_csv} onChange={e=>set('query_csv',e.target.value)} placeholder="path/to/query.csv (optional)" />
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}}>
              <div>
                <label style={labelStyle}>Recall Required</label>
                <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',fontSize:'13px',color:'#fff'}}>
                  <input type="checkbox" checked={form.recall_required} onChange={e=>set('recall_required',e.target.checked)} />
                  {form.recall_required ? "Yes" : "No"}
                </label>
              </div>
              <div>
                <label style={labelStyle}>Match Mode</label>
                <select className="select" style={{width:'100%'}} value={form.recall_match_mode} onChange={e=>set('recall_match_mode',e.target.value)}>
                  <option value="pdf_page">pdf_page</option>
                  <option value="pdf_only">pdf_only</option>
                </select>
              </div>
              <div>
                <label style={labelStyle}>Recall Adapter</label>
                <select className="select" style={{width:'100%'}} value={form.recall_adapter} onChange={e=>set('recall_adapter',e.target.value)}>
                  <option value="none">none</option>
                  <option value="page_plus_one">page_plus_one</option>
                  <option value="financebench_json">financebench_json</option>
                </select>
              </div>
            </div>
            <div>
              <label style={labelStyle}>Description</label>
              <input className="input" style={{width:'100%'}} value={form.description} onChange={e=>set('description',e.target.value)} placeholder="Optional description" />
            </div>
            <div>
              <label style={labelStyle}>Tags</label>
              <input className="input" style={{width:'100%'}} value={form.tags} onChange={e=>set('tags',e.target.value)} placeholder="Comma-separated tags" />
            </div>
          </div>
          <div className="modal-foot">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button type="submit" disabled={saving||!form.name.trim()||!form.path.trim()} className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>
              {saving ? <><span className="spinner" style={{marginRight:'8px'}}></span>Saving…</> : isEdit ? "Update Dataset" : "Add Dataset"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function PresetFormModal({ preset, onClose, onSaved }) {
  const isEdit = !!preset;
  const existingConfig = (isEdit && typeof preset.config === 'object') ? preset.config : {};
  const [name, setName] = useState(preset?.name || "");
  const [description, setDescription] = useState(preset?.description || "");
  const [tags, setTags] = useState((preset?.tags || []).join(", "));
  const [config, setConfig] = useState(() => {
    const c = {};
    TUNING_FIELDS.forEach(f => { c[f.key] = existingConfig[f.key] != null ? String(existingConfig[f.key]) : ""; });
    return c;
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  function setField(key, val) { setConfig(c=>({...c,[key]:val})); }

  async function handleSubmit(e) {
    e.preventDefault();
    if (!name.trim()) return;
    setSaving(true);
    setError("");
    const parsedConfig = {};
    TUNING_FIELDS.forEach(f => {
      const raw = config[f.key];
      if (raw !== "" && raw != null) {
        parsedConfig[f.key] = f.type === "int" ? parseInt(raw, 10) : parseFloat(raw);
      }
    });
    const payload = {
      name: name.trim(),
      description: description || null,
      config: parsedConfig,
      tags: tags ? tags.split(",").map(t=>t.trim()).filter(Boolean) : [],
    };
    try {
      const url = isEdit ? `/api/managed-presets/${preset.id}` : "/api/managed-presets";
      const method = isEdit ? "PUT" : "POST";
      const res = await fetch(url, {
        method, headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const data = await res.json().catch(()=>({}));
        throw new Error(data.detail || `HTTP ${res.status}`);
      }
      onSaved();
    } catch (err) {
      setError(err.message);
    } finally {
      setSaving(false);
    }
  }

  const labelStyle = {display:'block',fontSize:'11px',fontWeight:500,color:'var(--nv-text-muted)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.04em'};

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" style={{maxWidth:'640px'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2 style={{fontSize:'16px',fontWeight:700,color:'#fff'}}>{isEdit ? "Edit Preset" : "Create Preset"}</h2>
          <button className="btn btn-ghost btn-icon" onClick={onClose} style={{borderRadius:'50%'}}><IconX /></button>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:'16px',maxHeight:'65vh',overflowY:'auto'}}>
            {error && (
              <div style={{padding:'10px 14px',borderRadius:'8px',background:'rgba(255,50,50,0.08)',border:'1px solid rgba(255,50,50,0.2)',color:'#ff5050',fontSize:'13px'}}>{error}</div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              <div>
                <label style={labelStyle}>Name *</label>
                <input className="input" style={{width:'100%'}} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. single_gpu" required />
              </div>
              <div>
                <label style={labelStyle}>Description</label>
                <input className="input" style={{width:'100%'}} value={description} onChange={e=>setDescription(e.target.value)} placeholder="Optional description" />
              </div>
            </div>

            {TUNING_GROUPS.map(g => (
              <div key={g.label}>
                <div style={{fontSize:'12px',fontWeight:600,color:'var(--nv-green)',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.05em'}}>{g.label}</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(140px, 1fr))',gap:'8px'}}>
                  {g.fields.map(f => (
                    <div key={f.key}>
                      <label style={{...labelStyle,fontSize:'10px'}}>{f.label}</label>
                      <input className="input" style={{width:'100%',fontSize:'13px'}} type="number" step={f.type==='float'?'any':'1'} value={config[f.key]} onChange={e=>setField(f.key,e.target.value)} placeholder="\u2014" />
                    </div>
                  ))}
                </div>
              </div>
            ))}

            <div>
              <label style={labelStyle}>Tags</label>
              <input className="input" style={{width:'100%'}} value={tags} onChange={e=>setTags(e.target.value)} placeholder="Comma-separated tags" />
            </div>
          </div>
          <div className="modal-foot">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button type="submit" disabled={saving||!name.trim()} className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>
              {saving ? <><span className="spinner" style={{marginRight:'8px'}}></span>Saving…</> : isEdit ? "Update Preset" : "Create Preset"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ===== Scheduling View ===== */
function fmtRelative(isoStr) {
  if (!isoStr) return null;
  const target = new Date(isoStr);
  const now = new Date();
  let diff = Math.round((target - now) / 1000);
  if (diff < 0) return "now";
  if (diff < 60) return `${diff}s`;
  const mins = Math.floor(diff / 60); diff %= 60;
  if (mins < 60) return `${mins}m ${diff}s`;
  const hrs = Math.floor(mins / 60); const rm = mins % 60;
  if (hrs < 24) return `${hrs}h ${rm}m`;
  const days = Math.floor(hrs / 24); const rh = hrs % 24;
  return `${days}d ${rh}h`;
}

function fmtIsoShort(isoStr) {
  if (!isoStr) return "\u2014";
  try {
    const d = new Date(isoStr);
    return d.toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false,timeZoneName:'short'});
  } catch { return isoStr; }
}
