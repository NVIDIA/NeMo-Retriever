{{/*
Chart-managed NGC pull + auth Secrets.

These two Secrets are referenced *by name* from each NIMCache / NIMService
template under templates/nims/, and from the service Deployment's
imagePullSecrets list. The default names — `ngc-secret` and `ngc-api` —
match the canonical NIM Operator examples and should not normally be
changed.

Set `<block>.create: false` to bring your own (already-present in the
namespace) Secret with the same name.
*/}}
{{- if .Values.ngcImagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ngcImagePullSecret.name }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "nemo-retriever.ngcImagePullSecret" . | quote }}
{{- end }}

{{- $scopeSecret := .Values.serviceConfig.auth.scopeTokenSecret }}
{{- if $scopeSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-scope-tokens" (include "nemo-retriever.fullname" .)) $scopeSecret.name }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $scopeSecret.key }}: {{ required "serviceConfig.auth.scopeTokenSecret.value is required when create=true" $scopeSecret.value | quote }}
{{- end }}

{{- $internalSecret := .Values.serviceConfig.vectordb.internalTokenSecret }}
{{- if $internalSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-vectordb-internal" (include "nemo-retriever.fullname" .)) $internalSecret.name }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $internalSecret.key }}: {{ required "serviceConfig.vectordb.internalTokenSecret.value is required when create=true" $internalSecret.value | quote }}
{{- end }}

{{- $storageSecret := .Values.serviceConfig.vectordb.artifactStorageOptionsSecret }}
{{- if $storageSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-artifact-storage" (include "nemo-retriever.fullname" .)) $storageSecret.name }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $storageSecret.key }}: {{ $storageSecret.value | quote }}
{{- end }}

{{- if .Values.ngcApiSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ngcApiSecret.name }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
type: Opaque
stringData:
  NGC_API_KEY: {{ .Values.ngcApiSecret.password | quote }}
  NGC_CLI_API_KEY: {{ .Values.ngcApiSecret.password | quote }}
{{- end }}
