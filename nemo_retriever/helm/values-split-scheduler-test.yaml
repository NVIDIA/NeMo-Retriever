# Reusable retriever-dev split-mode scheduler validation overlay.
topology:
  mode: split
  gateway:
    replicas: 1
  realtime:
    replicas: 1
  batch:
    replicas: 2

serviceConfig:
  workQueue:
    maxActiveLeases:
      realtime: 8
      batch: 48

serviceMonitor:
  enabled: false
  autoEnableInSplitMode: false

autoscaling:
  queueDepth:
    backend: prometheus-adapter
    prometheusAdapter:
      rules:
        create: true
