# =============================================================================
# nemo-retriever Helm chart — default values
# =============================================================================
#
# This chart deploys the "service" run mode of nemo-retriever and, optionally,
# the five NIM microservices it orchestrates against. See README.md for a full
# walkthrough of every knob below.
# =============================================================================

# -----------------------------------------------------------------------------
# Naming overrides
# -----------------------------------------------------------------------------
# nameOverride replaces the chart name (`nemo-retriever`) in resource names.
# fullnameOverride entirely replaces the generated `<release>-<chart>` prefix.
nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# Pull secrets
# -----------------------------------------------------------------------------
# Image pull secrets applied to every Pod the chart creates (service + NIMs).
# Either reference pre-existing secrets by name OR let the chart create one
# from a docker-config JSON via `imagePullSecret.create`.
imagePullSecrets: []
#  - name: ngc-pull-secret

imagePullSecret:
  # When true, render a Secret of type kubernetes.io/dockerconfigjson with
  # the contents below. The created Secret is automatically appended to
  # `imagePullSecrets` for every Pod.
  create: false
  name: "ngc-pull-secret"
  # Either supply `dockerconfigjson` (full ~/.docker/config.json contents,
  # base64-encoded) OR the convenience trio (registry + username + password).
  registry: "nvcr.io"
  username: "$oauthtoken"
  password: ""
  dockerconfigjson: ""

# =============================================================================
# Service (the FastAPI nemo-retriever ingest server)
# =============================================================================
service:
  image:
    # Default points at the staging image published to NGC. Override
    # `repository` / `tag` to pin a different build, e.g. one produced by:
    #   docker build -f nemo_retriever/Dockerfile --target service \
    #       -t <your-registry>/nemo-retriever-service:<tag> .
    repository: localhost:32000/nemo-retriever-service
    tag: "latest"
    pullPolicy: Always

  # Number of pod replicas. Must stay at 1 while persistence is SQLite-backed
  # (RWO PVC + single writer). Bumping this requires switching to a shared
  # database (Postgres support is on the roadmap).
  replicas: 1

  # Pod-level scheduling controls.
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  # Prefer co-locating the retriever pod on the same node as NIM pods to
  # minimize network latency for inference calls. This is a soft preference
  # (preferredDuringScheduling) so the pod still schedules if no NIM node
  # has capacity.
  affinity:
    podAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - nim
            topologyKey: kubernetes.io/hostname
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 60

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext: {}

  serviceAccount:
    # When `create` is true, a ServiceAccount named after the release is
    # created and bound to the Deployment. Set `create: false` and supply
    # `name` to bind to an existing one.
    create: true
    name: ""
    annotations: {}

  # Container resource requests/limits. Tune `processing.numWorkers` below in
  # tandem; each worker process consumes RAM proportional to typical batch
  # size.
  resources:
    requests:
      cpu: "16"
      memory: "16Gi"
    limits:
      cpu: "96"
      memory: "96Gi"

  # GPU is *not* required for service mode (the pipeline calls remote NIM
  # endpoints over HTTP). Leave `gpu.enabled` false unless you intentionally
  # want to schedule onto a GPU node for some custom workload.
  gpu:
    enabled: false
    count: 0
    productClass: ""

  # Liveness, readiness, and startup probes.  All use the dedicated
  # GET /v1/health endpoint which returns {"status":"ok"} with no auth.
  livenessProbe:
    enabled: true
    httpGet:
      path: /v1/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 6

  readinessProbe:
    enabled: true
    httpGet:
      path: /v1/health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  startupProbe:
    enabled: true
    httpGet:
      path: /v1/health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 60

  # Extra env vars (after the chart-managed ones). Use `envFrom` to pull
  # whole Secrets/ConfigMaps in.
  env: []
  #  - name: PYTHONFAULTHANDLER
  #    value: "1"
  envFrom: []

  # Extra arbitrary volumes / mounts (e.g. for shipping CA bundles).
  extraVolumes: []
  extraVolumeMounts: []

# =============================================================================
# Kubernetes Service (network)
# =============================================================================
networkService:
  type: NodePort
  port: 7670
  # Optional: override the targetPort name. Should match container port name.
  targetPort: http
  annotations: {}
  labels: {}
  # NodePort assignment (only used when type=NodePort).
  # Leave empty to let Kubernetes auto-assign from the 30000-32767 range.
  nodePort: 30670

# =============================================================================
# Topology — single-pod vs split gateway/worker architecture
# =============================================================================
# When mode is "standalone" (default), the chart creates a single Deployment
# that runs both realtime and batch pools in-process. This is the simplest
#
# When mode is "split", the chart creates three Deployments:
#   1. gateway  — lightweight proxy that routes uploads to the correct backend
#   2. realtime — worker pod(s) for low-latency page processing
#   3. batch    — worker pod(s) for throughput-oriented document processing
#
# External traffic always enters through the gateway Service; realtime and
# batch Services are ClusterIP-only and not directly exposed.
topology:
  mode: standalone   # "standalone" or "split"

  gateway:
    replicas: 2
    resources:
      requests:
        cpu: "4"
        memory: "12Gi"
      limits:
        cpu: "16"
        memory: "48Gi"
    nodeSelector: {}
    tolerations: []
    affinity: {}

  realtime:
    replicas: 2
    resources:
      requests:
        cpu: "8"
        memory: "24Gi"
      limits:
        cpu: "16"
        memory: "96Gi"
    gpu:
      enabled: false
      count: 0
    nodeSelector: {}
    tolerations: []
    affinity: {}
    # -------------------------------------------------------------------
    # Horizontal Pod Autoscaler — realtime
    # -------------------------------------------------------------------
    # The HPA combines three independent signals (any can be disabled):
    #   • queueDepthRatio       — pool fill (0..1), via prometheus-adapter
    #   • processingLatencyP95  — 95th-percentile pipeline duration (s)
    #   • cpu                   — utilization fallback, plain Resource metric
    #
    # Metrics that depend on Prometheus only render when
    # `autoscaling.queueDepth.backend` is set to "prometheus-adapter"
    # (the default) AND the per-metric `enabled` flag below is true.
    # If neither queue-depth nor latency is enabled, the HPA degrades
    # to the CPU fallback so the chart still scales on a vanilla
    # cluster.
    #
    # The deprecated `targetCPUUtilizationPercentage` knob is honoured
    # as an alias for `metrics.cpu.targetUtilizationPercentage` so
    # existing values files keep working.
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      metrics:
        queueDepthRatio:
          enabled: true
          # AverageValue across replicas — scale up when per-replica
          # queue fill exceeds 0.5 (50%). Quantity strings are passed
          # verbatim to the HPA; `500m` == 0.5 in k8s quantity notation.
          target: "500m"
        processingLatencyP95:
          enabled: true
          # Seconds of per-item p95 latency that triggers scale-up.
          # Realtime pages typically finish in < 5s; 30s is the slow-stage
          # threshold (OCR + chart inference on a hot path).
          targetSeconds: "30"
        cpu:
          enabled: false
          targetUtilizationPercentage: 60
      # k8s HPA `v2` behavior block — passed through verbatim. Realtime
      # scales out aggressively (double or +2 pods per minute) and
      # scales down slowly to avoid flapping during burst-then-drain
      # workloads.
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
            - type: Pods
              value: 2
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 120
      # Legacy alias — kept so values files written before the metrics
      # block existed still scale on CPU. When set AND
      # `metrics.cpu.enabled` is false, the chart auto-flips CPU on
      # with this value. Remove once you migrate to `metrics.cpu`.
      targetCPUUtilizationPercentage: null

  batch:
    replicas: 2
    resources:
      requests:
        cpu: "16"
        memory: "48Gi"
      limits:
        cpu: "32"
        memory: "128Gi"
    gpu:
      enabled: true
      count: 1
    nodeSelector: {}
    tolerations: []
    affinity: {}
    # Batch HPA tuning differs from realtime: a deeper queue is normal
    # (we *want* batching), and replicas usually carry expensive GPUs
    # that we'd rather not churn. So:
    #   • Higher queueDepthRatio target (allow steady-state fill)
    #   • Higher p95 latency target (batch jobs can legitimately take
    #     minutes per item)
    #   • Longer scaleDown stabilization window (no GPU thrash)
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      metrics:
        queueDepthRatio:
          enabled: true
          target: "700m"   # 70% — batch runs hot by design
        processingLatencyP95:
          enabled: true
          targetSeconds: "120"
        cpu:
          enabled: false
          targetUtilizationPercentage: 80
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 1
              periodSeconds: 120
        scaleDown:
          stabilizationWindowSeconds: 600
          policies:
            - type: Pods
              value: 1
              periodSeconds: 300
      targetCPUUtilizationPercentage: null

  vectordb:
    replicas: 1
    port: 7671
    resources:
      requests:
        cpu: "8"
        memory: "16Gi"
      limits:
        cpu: "16"
        memory: "96Gi"
    nodeSelector: {}
    tolerations: []
    affinity: {}
    persistence:
      enabled: true
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: "50Gi"

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  # Deploys an in-cluster OpenTelemetry Collector for traces, metrics, and logs.
  # Disable with `topology.otel.enabled: false`.  The collector exposes OTLP
  # gRPC (4317) and OTLP HTTP (4318) receivers by default.
  otel:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.127.0"
      pullPolicy: IfNotPresent
    replicas: 1
    ports:
      otlpGrpc: 4317
      otlpHttp: 4318
      prometheus: 8889
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "512Mi"
    nodeSelector: {}
    tolerations: []
    affinity: {}
    config:
      extensions:
        health_check:
          endpoint: "0.0.0.0:13133"
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
      processors:
        batch:
          timeout: 5s
          send_batch_size: 1024
      exporters:
        debug:
          verbosity: basic
      service:
        extensions: [health_check]
        pipelines:
          traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug]
          metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug]
          logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug]

# =============================================================================
# retriever-service.yaml configuration
# =============================================================================
# Everything in `serviceConfig` is rendered into a ConfigMap and mounted as
# /etc/nemo-retriever/retriever-service.yaml inside the container, replacing
# the bundled default that ships in the image.
#
# When `nims.enabled` is true the chart auto-injects the in-cluster NIM URLs
# below into `serviceConfig.nimEndpoints.*` — any explicit value here is
# preserved as an override.
serviceConfig:
  server:
    host: "0.0.0.0"
    port: 7670

  logging:
    level: "INFO"
    file: "/var/lib/nemo-retriever/retriever-service.log"
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

  # External NIM endpoints. Used as-is when `nims.enabled` is false. When
  # `nims.enabled` is true these are *overridden* by the in-cluster
  # service URLs of the deployed NIMs (unless explicitly set here).
  nimEndpoints:
    pageElementsInvokeUrl: ""
    graphicElementsInvokeUrl: ""
    tableStructureInvokeUrl: ""
    ocrInvokeUrl: ""
    embedInvokeUrl: ""

  # Pipeline worker pools.  Workers are abstract dispatchers — sizing
  # depends on whether they do local GPU work or fan out to remote NIMs.
  # For CPU-only NIM-forwarding nodes, higher worker counts are fine.
  pipeline:
    realtimeWorkers: 24
    realtimeQueueSize: 2048
    batchWorkers: 48
    batchQueueSize: 8192

  resources:
    maxMemoryMb: null
    maxCpuCores: null
    gpuDevices: []

  # VectorDB pod configuration.  When enabled, a dedicated LanceDB pod
  # is deployed.  Workers POST embeddings to it; the gateway proxies
  # /v1/query to it for retrieval.
  vectordb:
    enabled: true
    lancedbUri: "/data/vectordb"
    tableName: "nemo_retriever"
    embedModel: "nvidia/llama-nemotron-embed-1b-v2"

  # Optional bearer-token authentication. When apiToken is set, every
  # request must carry "Authorization: Bearer <token>".
  auth:
    apiToken: null
    headerName: "Authorization"
    bypassPaths:
      - "/v1/health"
      - "/docs"
      - "/openapi.json"
      - "/redoc"


# =============================================================================
# NIM API key (for external NIM endpoints, e.g. build.nvidia.com)
# =============================================================================
nimApiKey:
  # When `value` is non-empty AND `existingSecret` is empty, the chart
  # creates a Secret with the supplied value and wires NVIDIA_API_KEY into
  # the service container.
  value: ""
  existingSecret: ""
  existingSecretKey: "NVIDIA_API_KEY"

# =============================================================================
# Retriever Results volume
# =============================================================================
# A PVC mounted at `mountPath` for storing per-job page results as JSON files.
# The processing pool writes results here and the /v1/ingest/job/{id}/results
# endpoint reads from this directory instead of SQLite for faster retrieval.
#
# Use local/host-path storage for results to avoid network I/O overhead.
retrieverResults:
  enabled: true
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 50Gi
  mountPath: /retriever_results
  annotations: {}

# =============================================================================
# Persistence (SQLite database + log file)
# =============================================================================
# A single ReadWriteOnce PVC mounted at `mountPath`. SQLite's WAL mode is
# enabled in-process, but cross-pod replication is NOT possible — keep
# `service.replicas` at 1 until a shared DB lands.
#
# IMPORTANT: SQLite WAL + spool fsync are latency-sensitive. Use local/
# host-path backed storage to avoid network I/O penalties (NFS, CephFS, or
# cloud block storage can add 5-50ms per fsync, severely throttling
# throughput).
persistence:
  enabled: true
  # When `existingClaim` is set the chart will skip PVC creation and mount
  # the named claim instead. Useful for promotion across releases.
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 50Gi
  mountPath: /var/lib/nemo-retriever
  annotations: {}

# =============================================================================
# Ingress (on by default)
# =============================================================================
ingress:
  enabled: true
  className: ""
  annotations: {}
  #   nginx.ingress.kubernetes.io/proxy-body-size: "200m"
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - host: nemo-retriever.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: nemo-retriever-tls
  #    hosts:
  #      - nemo-retriever.example.com

# =============================================================================
# HorizontalPodAutoscaler — standalone mode
# =============================================================================
# WARNING: While persistence is SQLite, scaling beyond 1 replica is unsafe
# (PVC is RWO + single writer). Keep maxReplicas=1 until the shared DB
# backend is in place. The template is included now so the scaffolding is
# ready when that day comes.
#
# For split mode (`topology.mode: split`), HPA configuration lives under
# `topology.realtime.hpa` and `topology.batch.hpa` instead — those pods
# are stateless and can scale on queue depth + latency. See the
# `autoscaling.queueDepth` block below for the backend wiring.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ""
  behavior: {}

  # ---------------------------------------------------------------------------
  # Queue-depth + latency autoscaling backend (split mode only)
  # ---------------------------------------------------------------------------
  # Chooses how the HPA gets at `nemo_retriever_pool_queue_depth_ratio`
  # and `nemo_retriever_pool_processing_duration_seconds`. The metrics
  # themselves are *always* published (see H1 — instrumented in
  # services/pipeline_pool.py); this block only controls the *delivery
  # path* into the Kubernetes metrics API.
  #
  # Supported values:
  #
  #   prometheus-adapter (recommended for production)
  #     • Requires: Prometheus + prometheus-adapter installed in-cluster.
  #     • Renders: `prometheus-adapter-rules.yaml` ConfigMap with the
  #       PromQL needed for the External Metrics API.
  #     • Chart hands the ConfigMap name to the operator; operator
  #       points its prometheus-adapter at it. No subchart bundling.
  #
  #   cpu
  #     • No Prometheus needed. The realtime/batch HPAs degrade to
  #       a Resource-typed CPU metric. Convenient for clusters
  #       without an observability stack — but ignores queue depth,
  #       so scaling lags behind queue saturation by minutes.
  #
  #   keda
  #     • Reserved hook. The chart does NOT install or render KEDA
  #       resources today; setting this disables the chart-managed
  #       HPAs so you can apply your own ScaledObject snippet.
  #       See README "Queue-depth autoscaling" for the template.
  #
  # The recommendation in this codebase is `prometheus-adapter`.
  # Reasoning is documented in helm/README.md.
  queueDepth:
    backend: "prometheus-adapter"

    prometheusAdapter:
      # External-metrics API names exposed by the adapter for our two
      # PromQL queries. These are what the HPA `metric.name` field
      # references; the adapter ConfigMap's `name.as` field has to match.
      queueDepthRatioMetric: "nemo_retriever_pool_queue_depth_ratio_avg"
      processingLatencyP95Metric: "nemo_retriever_pool_processing_duration_p95_seconds"
      # When `rules.create` is true the chart renders a ConfigMap with
      # the PromQL rules below; the operator wires their existing
      # prometheus-adapter at this ConfigMap via:
      #   helm upgrade prometheus-adapter ... \
      #     --set rules.existing=<release>-prom-adapter-rules
      # Set to false to bring-your-own rules (e.g. a cluster-wide ones).
      rules:
        create: true
        # Window for the histogram_quantile() PromQL — short enough to
        # react within a single HPA cycle (15s default), long enough to
        # smooth out noise. 2m matches the prometheus-adapter docs'
        # recommended default for short-lived workloads.
        latencyWindow: "2m"

# =============================================================================
# Prometheus integration (off by default in standalone, on by default
# in split mode — see autoEnableInSplitMode below)
# =============================================================================
# When `topology.mode: split` is active, queue-depth-driven autoscaling
# needs the worker pods' `/metrics` endpoint to be scraped by Prometheus.
# The `autoEnableInSplitMode: true` default below ensures the
# ServiceMonitor is rendered automatically in that case, even when the
# top-level `enabled` flag is left at its (legacy) `false`.
#
# Operators on standalone (or operators who scrape via another route —
# Prometheus Pushgateway, an external agent, OpenTelemetry, etc.) can
# leave both flags false and no ServiceMonitor will be produced.
serviceMonitor:
  enabled: false
  autoEnableInSplitMode: true
  namespace: ""
  interval: 15s
  scrapeTimeout: 10s
  path: /metrics
  labels: {}
  # Labels copied from the Service onto each scraped sample. We always
  # propagate `app.kubernetes.io/component` so prometheus-adapter (and
  # human Grafana queries) can filter on `component="realtime"` /
  # `component="batch"` even when our publisher's `pool` label happens
  # to disagree (e.g. during the standalone→split migration window).
  targetLabels:
    - app.kubernetes.io/component
  relabelings: []
  metricRelabelings: []

# =============================================================================
# NIMs (toggleable sub-stack)
# =============================================================================
# When `nims.enabled` is true, the chart deploys all five NIMs as
# Deployments + ClusterIP Services and wires their in-cluster URLs into the
# retriever-service config. When false, the chart deploys nothing GPU-shaped
# and uses `serviceConfig.nimEndpoints.*` (or `nimApiKey.value`) instead.
#
# Each NIM is independently togglable via its own `enabled` flag.
nims:
  enabled: false

  # Image pull secrets specific to the NIM sub-stack (in addition to the
  # global `imagePullSecrets`).
  imagePullSecrets: []

  # Default values inherited by every NIM unless overridden. Per-NIM blocks
  # below can override any of these keys.
  defaults:
    replicas: 1
    port: 8000
    shmSize: "16Gi"
    resources:
      requests:
        cpu: "1"
        memory: "8Gi"
      limits:
        cpu: "8"
        memory: "32Gi"
        nvidia.com/gpu: 1
    nodeSelector: {}
    tolerations: []
    affinity: {}
    podAnnotations: {}
    # Common NIM env. NGC_API_KEY is sourced from the NGC pull secret value
    # by default; override or extend via `env` per NIM.
    env:
      - name: NIM_HTTP_API_PORT
        value: "8000"
      - name: NIM_TRITON_LOG_VERBOSE
        value: "1"
      - name: NIM_ENABLE_OTEL
        value: "0"
    envFrom: []
    livenessProbe:
      tcpSocket:
        port: http
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 6
    readinessProbe:
      httpGet:
        path: /v1/health/ready
        port: http
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 12
    startupProbe:
      tcpSocket:
        port: http
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 60
    # Persistent volume for the NIM model cache (avoids re-downloading on
    # every pod restart). Disable per-NIM by setting `cache.enabled: false`.
    cache:
      enabled: true
      mountPath: /opt/nim/.cache
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 100Gi

  # NGC API key used by every NIM at startup. If `existingSecret` is empty
  # the chart creates a Secret with `value`. NGC_API_KEY is then exposed to
  # every NIM container.
  ngcApiKey:
    value: ""
    existingSecret: ""
    existingSecretKey: "NGC_API_KEY"

  # ---------------------------------------------------------------------------
  # The five NIMs. Each block is merged on top of `nims.defaults`. Setting
  # `enabled: false` removes that NIM entirely (and the chart will fall back
  # to `serviceConfig.nimEndpoints.*` for that endpoint, which must then be
  # populated by the operator).
  # ---------------------------------------------------------------------------
  pageElements:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/nemotron-page-elements-v3
      tag: "1.8.0"
      pullPolicy: IfNotPresent
    # The retriever-service config field this NIM populates.
    invokePath: /v1/infer

  graphicElements:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/nemotron-graphic-elements-v1
      tag: "1.8.0"
      pullPolicy: IfNotPresent
    invokePath: /v1/infer

  tableStructure:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/nemotron-table-structure-v1
      tag: "1.8.0"
      pullPolicy: IfNotPresent
    invokePath: /v1/infer

  ocr:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/nemotron-ocr-v1
      tag: "1.3.0"
      pullPolicy: IfNotPresent
    invokePath: /v1/infer

  embed:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/llama-nemotron-embed-1b-v2
      tag: "1.13.0"
      pullPolicy: IfNotPresent
    invokePath: /v1/embeddings
