# nv-ingest Test Configuration
# Edit the 'active' section directly to configure your test runs

# Active configuration (used by default when running tests)
active:
  # Dataset configuration
  dataset_dir: /path/to/dataset
  test_name: null  # Auto-generated if null

  # API configuration
  api_version: v2 # v1 or v2
  pdf_split_page_count: null # V2 only: pages per chunk (null = default 32)

  # Infrastructure
  hostname: localhost
  readiness_timeout: 600

  # Docker Compose configuration
  compose:
    profiles:
      - retrieval
      - reranker  # Required for recall evaluation

  # Helm configuration
  helm:
    bin: microk8s helm  # Helm binary command (e.g., "helm", "microk8s helm", "k3s helm")
    sudo: true  # Prepend sudo to helm commands (needed for microk8s/k3s without user in group)
    kubectl_bin: microk8s kubectl  # kubectl binary command (e.g., "kubectl", "microk8s kubectl")
    kubectl_sudo: null  # Prepend sudo to kubectl commands (null = same as helm_sudo)
    chart: nemo-microservices/nv-ingest  # Remote chart reference (set to null to use local chart from ./helm)
    chart_version: 26.1.2  # Chart version (required for remote charts)
    release: nv-ingest
    namespace: nv-ingest
    values_file: .helm-env  # Optional: path to values file
    # Multiple port forwards for Helm services
    port_forwards:
      - service: nv-ingest
        local_port: 7670
        remote_port: 7670
      - service: nv-ingest-milvus
        local_port: 19530
        remote_port: 19530
      - service: nv-ingest-milvus
        local_port: 9091
        remote_port: 9091
      - service: nv-ingest-minio
        local_port: 9000
        remote_port: 9000
      - service: "*embed*"  # Wildcard pattern to match embedding services
        local_port: 8012
        remote_port: 8000
      - service: "*rerank*"  # Wildcard pattern to match reranker services
        local_port: 8015
        remote_port: 8000
    values:  # inline Helm values
      nimOperator.rerankqa.enabled: true
      nimOperator.llama_3_2_nv_rerankqa_1b_v2.enabled: true

  # Runtime configuration
  sparse: false  # Use sparse embeddings (Milvus only)
  gpu_search: false  # Use GPU for search
  embedding_model: auto  # auto-detect or specify model name
  vdb_backend: lancedb  # milvus or lancedb
  hybrid: false  # LanceDB hybrid retrieval (FTS + vector)

  # Extraction configuration
  extract_text: true
  extract_tables: true
  extract_charts: true
  extract_images: false
  extract_infographics: true
  text_depth: page
  # table_output_format: markdown

  # Optional pipeline steps
  enable_caption: false  # Enable image captioning (ensure vlm profile is enabled)
  caption_prompt: null  # Override caption user prompt (null = service default)
  caption_reasoning: null  # Enable reasoning: true = enable, false = disable, null = service default (default is false)

  enable_split: false  # Enable text chunking
  split_chunk_size: 1024  # Chunk size for text splitting
  split_chunk_overlap: 150  # Overlap for text splitting
  enable_image_storage: false  # Enable server-side image storage (defaults to MinIO; set IMAGE_STORAGE_URI=file://... to opt into disk)

  # Storage configuration
  spill_dir: /tmp/spill
  artifacts_dir: null  # null = use default (tools/harness/artifacts)
  collection_name: null  # null = auto-generated

  # Custom UDF Configs - add specific udf configs here if needed.
  llm_summarization_model: nvdev/nvidia/llama-3.1-nemotron-70b-instruct  # LLM for summarization - this does NOT propagate to the UDF, but useful for artifact storage.

# Recall configuration (only used when running recall or e2e_recall tests)
# Remember to start the reranker service before running recall tests:
# docker compose --profile reranker up -d
recall:
  recall_dataset: null
  reranker_mode: both  # Options: "none", "with", "both"

  # Recall evaluation settings
  recall_top_k: 10
  ground_truth_dir: null

# QA evaluation configuration (only used when running qa_eval or e2e_qa_eval tests)
# These settings measure how well an LLM can answer questions given retrieved context.
#
# API keys are read from environment variables automatically by litellm:
#   NVIDIA_API_KEY  -> nvidia_nim/ prefixed models
#   OPENAI_API_KEY  -> openai/ prefixed models
# Do NOT put API keys in this file.
#
# To use a local vLLM/Ollama server instead of NIM:
#   model: openai/<model-name>   # openai/ prefix = any OpenAI-spec server
#   api_base: http://localhost:8000/v1
#   (remove api_base to use NIM defaults)
#
# Legacy dataset: set qa_dataset to "bo767_infographic" to use the older
# infographic-only ground truth (368 queries) instead of the full annotations.
qa_eval:
  qa_dataset: csv:data/bo767_annotations.csv
  qa_top_k: 5
  qa_retriever: file   # "topk" (queries existing VDB collection) | "file" (reads JSON)
  qa_retriever_config:
    file_path: data/test_retrieval/bo767_retrieval_fullpage.json
  qa_max_workers: 8

  # qa_llm_configs: list of LLMs to evaluate in a single run.
  # Each entry produces its own mean_score / latency entry in results.json.
  # model uses litellm provider-prefix routing.
  # extra_params: forwarded as **kwargs to litellm.completion (e.g. reasoning mode).
  qa_llm_configs:
    - name: nemotron_super_49b        # best accuracy preset (reasoning off for speed)
      model: nvidia_nim/nvidia/llama-3.3-nemotron-super-49b-v1.5
      api_key: ${NVIDIA_API_KEY}
    - name: qwen3_next_80b            # fast + good accuracy preset
      model: nvidia_nim/qwen/qwen3-next-80b-a3b-instruct
      api_key: ${NVIDIA_API_KEY}

  # qa_judge_config: judge LLM used for scoring answers 1-5.
  # Default: Mixtral-8x22B (strong general-purpose judge).
  qa_judge_config:
    model: nvidia_nim/mistralai/mixtral-8x22b-instruct-v0.1
    api_key: ${NVIDIA_API_KEY}

  # To restore TopK retrieval (VDB must be ingested first), replace the above with:
  # qa_retriever: topk
  # qa_retriever_config: null

  # Example: use ViDoRe v3 dataset instead of bo767_infographic
  # qa_dataset: vidore/vidore_v3_finance_en
  # qa_retriever: file
  # qa_retriever_config:
  #   file_path: /path/to/vidore_retrieval_results.json

# Pre-configured datasets
# Each dataset includes path, extraction settings, and recall evaluator
# Use: uv run nv-ingest-harness-run --case=e2e --dataset=bo767
datasets:
  bo767:
    path: /path/to/bo767
    extract_text: true
    extract_tables: true
    extract_charts: true
    extract_images: false
    extract_infographics: false
    recall_dataset: bo767
    qa_dataset: csv:data/bo767_annotations.csv

  earnings:
    path: /path/to/earnings_consulting
    extract_text: true
    extract_tables: true
    extract_charts: true
    extract_images: false
    extract_infographics: false
    recall_dataset: earnings

  bo20:
    path: /path/to/bo20
    extract_text: true
    extract_tables: true
    extract_charts: true
    extract_images: true
    extract_infographics: true
    recall_dataset: null

  financebench:
    path: /path/to/financebench
    extract_text: true
    extract_tables: true
    extract_charts: true
    extract_images: true
    extract_infographics: true
    recall_dataset: finance_bench

  # Single file example
  single:
    path: data/multimodal_test.pdf
    extract_text: true
    extract_tables: true
    extract_charts: true
    extract_images: true
    extract_infographics: true
    recall_dataset: null  # No recall evaluator for single file

# Example of a custom dataset configuration
  jensen_single:
    path: /path/to/jensen.pdf
    extract_text: true
    extract_tables: true
    extract_charts: true
    extract_images: true
    extract_infographics: true
    recall_dataset: null  # No recall evaluator for single file

  bo10k:
    path: /path/to/bo10k
    extract_text: true
    extract_tables: true
    extract_charts: true
    extract_images: false
    extract_infographics: true
    recall_dataset: bo10k

  jp20:
    path: /path/to/jp20
    extract_text: true
    extract_tables: true
    extract_charts: true
    extract_images: false
    extract_infographics: true
    recall_dataset: jp20
