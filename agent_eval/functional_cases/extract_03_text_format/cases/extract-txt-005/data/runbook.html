<h1>Aurora Runbook</h1>
<h2>Pager rotation</h2><p>Primary on-call alternates weekly between Platform-East and Platform-West teams.</p>
<h2>Common incidents</h2><p>If p99 latency exceeds 500ms for &gt; 5 minutes, page primary. If routing-layer errors exceed 1%, restart the routing pods one region at a time.</p>
