# ~/datasets/vidore_v3/skill_eval.yaml

# Absolute path to your agent-eval manifest (JSON list).
# eval_manifest_path: /raid/retriever-sdg-v3/runs/vidore_v3_agent_evals_20260513_batch_1/eval_manifest.json
eval_manifest_path: /raid/retriever-sdg-v3/runs/vidore_v3_agent_evals_20260514_batch_2/agent_scenario_manifest.json
# eval_manifest_path: /raid/retriever-sdg-v3/runs/nemo_retriever_agent_functional_batch_3/eval_manifest.json
# Per-domain PDF roots. KEY = manifest "domain" field; VALUE = directory of PDFs.
# Substitute <VIDORE_ROOT> with wherever your ViDoRe v3 corpus lives.
pdf_dirs:
  vidore_v3_computer_science:  /raid/data/vidore_v3/vidore_v3_computer_science
  vidore_v3_energy:            /raid/data/vidore_v3/vidore_v3_energy
  vidore_v3_finance_en:        /raid/data/vidore_v3/vidore_v3_finance_en
  vidore_v3_finance_fr:        /raid/data/vidore_v3/vidore_v3_finance_fr
  vidore_v3_hr:                /raid/data/vidore_v3/vidore_v3_hr
  vidore_v3_industrial:        /raid/data/vidore_v3/vidore_v3_industrial
  vidore_v3_pharmaceuticals:   /raid/data/vidore_v3/vidore_v3_pharmaceuticals
  vidore_v3_physics:           /raid/data/vidore_v3/vidore_v3_physics

# OPTIONAL — rewrite dataset-source path prefixes in paraphrased prompts to ./pdfs.
# Add one entry per prefix the manifest hard-codes.


# Agent + per-trial limits (defaults shown).
# agent: codex
agent: claude
agent_models:
  claude: claude-opus-4-7
  codex: gpt-5.5
per_trial_budget_usd: 5.0
per_trial_timeout_s: 7200
# 1 preserves the historical single-session linear query loop. Values >1 run
# query turns in isolated sessions copied from the completed setup workdir.
# WARNING: with the default LOCAL embed/rerank backend (vLLM), every concurrent
# query cold-loads its own model onto the GPU. The 0.04 retriever-success run
# used 60 here and the GPUs OOM'd (CUDA out of memory / engine-core init failed),
# leaving queries stuck in D-state for minutes. Keep this low (≈ #GPUs, so ~8)
# unless you (a) point at a shared NIM endpoint via --embed-invoke-url /
# --reranker-invoke-url, or (b) pin processes with CUDA_VISIBLE_DEVICES.
query_parallelism: 1
per_trial_workdir_root: ./tmp/skill_eval

# Conditions to run, in order. Each (condition, domain) setup workdir is deleted
# after it finishes. With query_parallelism >1, per-query copies may temporarily create
# multiple LanceDBs.
conditions:
  - c1_base
  - c2_retriever
  - c3_retriever_skill

# LLM-as-judge. Skipped silently if $NVIDIA_API_KEY is unset.
judge:
  enabled: true
  model: openai/nvidia/nvidia/llama-3.3-nemotron-super-49b-v1.5
  api_base: https://inference-api.nvidia.com/v1
  api_key_env: NVIDIA_INFERENCE_KEY
  max_tokens: 32768
  temperature: 0.0

summarizer:
  enabled: true
  model: claude-opus-4-7
