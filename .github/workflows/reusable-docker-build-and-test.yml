name: Reusable Docker Test (prebuilt image)

# Pulls a fixed NVIDIA NRL service image, mounts the checkout at /workspace/nemo-retriever,
# installs the repo editable, and runs pytest (no local image build).

on:
  workflow_call:
    inputs:
      test-image:
        description: 'Prebuilt nvcr.io image to run tests in'
        required: false
        type: string
        default: 'nvcr.io/nvstaging/nim/nrl-service:2026.05.06'
      platform:
        description: 'Platform for docker run (e.g. linux/amd64)'
        required: false
        type: string
        default: 'linux/amd64'
      runner:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'
      test-selection:
        description: 'Test selection strategy (full or random)'
        required: false
        type: string
        default: 'full'
      random-count:
        description: 'Number of tests to run when test-selection=random'
        required: false
        type: string
        default: '100'
      pytest-markers:
        description: 'Pytest markers expression (random selection only)'
        required: false
        type: string
        default: 'not integration'
      coverage:
        description: 'Collect coverage.xml and upload it'
        required: false
        type: boolean
        default: true
    secrets:
      HF_ACCESS_TOKEN:
        required: false
      DOCKER_PASSWORD:
        required: false

jobs:
  build-and-test:
    runs-on: ${{ inputs.runner }}
    env:
      CONTAINER_WORKDIR: /workspace/nemo-retriever
      TEST_IMAGE: ${{ inputs.test-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to NGC (nvcr.io)
        uses: ./.github/actions/docker-login-ngc
        with:
          registry: nvcr.io
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull test image
        run: docker pull --platform "${{ inputs.platform }}" "$TEST_IMAGE"

      - name: Create HF token file (optional)
        env:
          HF_ACCESS_TOKEN: ${{ secrets.HF_ACCESS_TOKEN }}
        run: |
          mkdir -p ./scripts/private_local
          if [ -n "${HF_ACCESS_TOKEN}" ]; then
            printf '%s' "${HF_ACCESS_TOKEN}" > ./scripts/private_local/hf_token.txt
          fi

      - name: Run tests inside Docker container
        run: |
          set -euo pipefail

          IMAGE="$TEST_IMAGE"
          PLATFORM="${{ inputs.platform }}"
          MARKERS="${{ inputs.pytest-markers }}"
          MOUNT_SRC="${GITHUB_WORKSPACE}"
          WORKDIR="${CONTAINER_WORKDIR}"

          if [ "${{ inputs.test-selection }}" != "full" ] && [ "${{ inputs.test-selection }}" != "random" ]; then
            echo "Error: test-selection must be 'full' or 'random'"
            exit 1
          fi

          BASE_CMD='set -euo pipefail && source /opt/retriever_runtime/bin/activate && uv pip install -e ./nemo_retriever[all,dev] && uv pip install pytest pytest-cov'

          if [ "${{ inputs.coverage }}" = "true" ]; then
            COV_ARGS=' --cov=nemo_retriever --cov-report term --cov-report xml:/tmp/coverage.xml'
          else
            COV_ARGS=""
          fi

          if [ "${{ inputs.test-selection }}" = "full" ]; then
            CMD="$BASE_CMD && python -m pytest nemo_retriever/tests${COV_ARGS}"
          else
            N="${{ inputs.random-count }}"
            CMD="$BASE_CMD && python -m pytest --collect-only -q nemo_retriever/tests | grep '::' | shuf -n \"${N}\" > /tmp/selected-tests.txt && python -m pytest -rs -m \"${MARKERS}\"${COV_ARGS} \$(cat /tmp/selected-tests.txt)"
          fi

          DOCKER_MOUNT_FLAGS=(
            -u root
            --platform "${PLATFORM}"
            -v "${MOUNT_SRC}:${WORKDIR}"
            -w "${WORKDIR}"
          )

          if [ "${{ inputs.coverage }}" = "true" ]; then
            CID="$(docker create "${DOCKER_MOUNT_FLAGS[@]}" "${IMAGE}" bash -lc "${CMD}")"
            docker start -a "${CID}"
            docker cp "${CID}":/tmp/coverage.xml ./coverage.xml || true
            docker rm -f "${CID}"
          else
            docker run --rm "${DOCKER_MOUNT_FLAGS[@]}" "${IMAGE}" bash -lc "${CMD}"
          fi

      - name: Upload coverage report
        if: ${{ inputs.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Cleanup HF token file
        if: always()
        run: rm -f ./scripts/private_local/hf_token.txt
